services:
  - type: web
    name: bieri-family-hub
    runtime: node
    buildCommand: npm ci --include=dev && npm run build
    startCommand: node dist/index.cjs
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: VITE_SUPABASE_URL
        sync: false
      - key: VITE_SUPABASE_ANON_KEY
        sync: false
      - key: APP_PASSWORD
        sync: false
